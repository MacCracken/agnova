name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep 'cyrius *= *"' cyrius.cyml 2>/dev/null | head -1 | sed 's/.*"\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Lint
        run: |
          set -e
          for f in src/*.cyr; do
            cyrius lint "$f"
          done

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/agnova

      - name: Test suite
        run: |
          out=$(cyrius test tests/agnova.tcyr 2>&1)
          tail=$(echo "$out" | tail -1)
          echo "$tail"
          # Must say "N passed, 0 failed (N total)"
          echo "$tail" | grep -qE '^[0-9]+ passed, 0 failed \([0-9]+ total\)$'

      - name: Smoke test (version)
        run: |
          out=$(./build/agnova version)
          echo "$out"
          echo "$out" | grep -q "^agnova "
          echo "$out" | grep -q "^cyrius "

      - name: Smoke test (plan)
        run: |
          ./build/agnova plan --device /dev/sda --user ci > /tmp/plan.txt
          echo "--- plan output ---"
          cat /tmp/plan.txt
          echo "--- assertions ---"
          grep -q "validation: OK" /tmp/plan.txt
          grep -q "13 phases, 62 operations" /tmp/plan.txt

      - name: Smoke test (execute gate)
        run: |
          # Should refuse without --i-mean-it and exit 2.
          set +e
          out=$(./build/agnova execute --device /dev/sda --user ci 2>&1)
          rc=$?
          echo "$out"
          test "$rc" = "2"
          echo "$out" | grep -q "DANGER"
          echo "$out" | grep -q "i-mean-it"

  changelog:
    name: CHANGELOG updated
    # Every PR must record its change (Keep a Changelog policy, see CLAUDE.md).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a CHANGELOG.md entry
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -qx "CHANGELOG.md"; then
            echo "OK: CHANGELOG.md updated in this PR"
          else
            echo "ERROR: this PR does not modify CHANGELOG.md."
            echo "Add an entry under [Unreleased] (https://keepachangelog.com/)."
            exit 1
          fi

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          set -e
          required=(
            README.md
            CHANGELOG.md
            CONTRIBUTING.md
            SECURITY.md
            CODE_OF_CONDUCT.md
            VERSION
            LICENSE
            cyrius.cyml
            CLAUDE.md
            docs/architecture/overview.md
            docs/development/roadmap.md
          )
          for doc in "${required[@]}"; do
            test -f "$doc" && echo "OK: $doc" || { echo "MISSING: $doc"; exit 1; }
          done
